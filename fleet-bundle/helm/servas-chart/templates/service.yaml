---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "servas-chart.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}   # ← Fix this line
      protocol: TCP
      name: http
  selector:
    app: {{ include "servas-chart.name" . }}
